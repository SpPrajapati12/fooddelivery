name: React CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  APP_NAME: react-ecommerce
  IMAGE_TAG: latest
  HOST_PORT: 3000
  CONTAINER_PORT: 80

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------- NODE SETUP ----------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ---------------- CLEAN INSTALL (FIXED) ----------------
      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json || true
          npm install

      # ---------------- BUILD REACT APP ----------------
      - name: Build React App
        run: npm run build

      # ---------------- DOCKER BUILD ----------------
      - name: Build Docker Image
        run: docker build -t ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} .

      # ---------------- STOP OLD CONTAINER ----------------
      - name: Stop Existing Container
        run: docker stop ${{ env.APP_NAME }} || true

      - name: Remove Existing Container
        run: docker rm ${{ env.APP_NAME }} || true

      # ---------------- RUN CONTAINER ----------------
      - name: Run Docker Container
        run: |
          docker run -d \
          -p ${{ env.HOST_PORT }}:${{ env.CONTAINER_PORT }} \
          --name ${{ env.APP_NAME }} \
          ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}

      # ---------------- VERIFY ----------------
      - name: Check Running Containers
        run: docker ps

      # ---------------- HEALTH CHECK ----------------
      - name: Health Check
        run: |
          sleep 10
          curl -f http://localhost:${{ env.HOST_PORT }} || exit 1

      # ---------------- CLEANUP ----------------
      - name: Cleanup Container
        if: always()
        run: |
          docker stop ${{ env.APP_NAME }} || true
          docker rm ${{ env.APP_NAME }} || true