name: React Production CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  APP_NAME: react-ecommerce
  CONTAINER_NAME: react-ecommerce
  IMAGE_TAG: ${{ github.run_number }}
  HOST_PORT: 3000
  CONTAINER_PORT: 80
  DOCKER_HUB_USER: ${{ secrets.DOCKER_HUB_USER }}
  DOCKER_HUB_PASS: ${{ secrets.DOCKER_HUB_PASS }}

jobs:
  ci-cd:
    runs-on: self-hosted

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------- NODE SETUP ----------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ---------------- INSTALL ----------------
      - name: Install Dependencies
        run: npm ci

      # ---------------- BUILD ----------------
      - name: Build React App
        run: npm run build

      # ---------------- DOCKER LOGIN ----------------
      - name: Login to Docker Hub
        run: |
          echo "${{ env.DOCKER_HUB_PASS }}" | docker login -u "${{ env.DOCKER_HUB_USER }}" --password-stdin

      # ---------------- BUILD IMAGE ----------------
      - name: Build Docker Image
        run: |
          docker build -t ${{ env.DOCKER_HUB_USER }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} .

      # ---------------- PUSH IMAGE ----------------
      - name: Push Docker Image
        run: |
          docker push ${{ env.DOCKER_HUB_USER }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}

      # ---------------- STOP OLD CONTAINER ----------------
      - name: Stop Old Container
        run: |
          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true

      # ---------------- RUN NEW CONTAINER ----------------
      - name: Run New Container
        run: |
          docker run -d ^
          -p ${{ env.HOST_PORT }}:${{ env.CONTAINER_PORT }} ^
          --name ${{ env.CONTAINER_NAME }} ^
          ${{ env.DOCKER_HUB_USER }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}

      # ---------------- HEALTH CHECK ----------------
      - name: Health Check
        shell: bash
        run: |
          echo "Checking app health..."
          sleep 10

          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ env.HOST_PORT }})
            echo "Attempt $i - Status: $STATUS"

            if [ "$STATUS" == "200" ]; then
              echo "App is healthy ✅"
              exit 0
            fi

            sleep 5
          done

          echo "Health check failed ❌"
          exit 1

      # ---------------- ROLLBACK ON FAILURE ----------------
      - name: Rollback Previous Version
        if: failure()
        run: |
          echo "Rollback triggered..."

          docker stop ${{ env.CONTAINER_NAME }} || true
          docker rm ${{ env.CONTAINER_NAME }} || true

          docker run -d ^
          -p ${{ env.HOST_PORT }}:${{ env.CONTAINER_PORT }} ^
          --name ${{ env.CONTAINER_NAME }} ^
          ${{ env.DOCKER_HUB_USER }}/${{ env.APP_NAME }}:latest

      # ---------------- SUCCESS ----------------
      - name: Deployment Success
        if: success()
        run: echo "🚀 Deployment successful"

      # ---------------- FAILURE LOG ----------------
      - name: Deployment Failed Logs
        if: failure()
        run: docker logs ${{ env.CONTAINER_NAME }} || true