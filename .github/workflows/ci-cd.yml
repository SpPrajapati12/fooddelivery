name: React CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  APP_NAME: react-ecommerce
  CONTAINER_NAME: react-ecommerce
  IMAGE_TAG: latest
  HOST_PORT: 3000
  CONTAINER_PORT: 80

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm ci

      # ---------------- BUILD PHASE ----------------
      - name: Build React App
        id: build
        run: |
          echo "Starting build..."
          npm run build
          echo "Build completed successfully"

      # ---------------- DOCKER BUILD ----------------
      - name: Build Docker Image
        id: docker_build
        run: |
          docker build -t ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} .
          echo "Docker image built successfully"

      # ---------------- STOP OLD CONTAINER ----------------
      - name: Stop Existing Container
        shell: cmd
        run: |
          docker stop ${{ env.CONTAINER_NAME }} || exit 0

      - name: Remove Existing Container
        shell: cmd
        run: |
          docker rm ${{ env.CONTAINER_NAME }} || exit 0

      # ---------------- RUN NEW CONTAINER ----------------
      - name: Run Docker Container
        run: |
          docker run -d ^
          -p ${{ env.HOST_PORT }}:${{ env.CONTAINER_PORT }} ^
          --name ${{ env.CONTAINER_NAME }} ^
          ${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}

      # ---------------- VERIFY DEPLOYMENT ----------------
      - name: Verify Container Status
        run: |
          docker ps | findstr ${{ env.CONTAINER_NAME }}
          if %ERRORLEVEL% NEQ 0 exit 1

      - name: Show Logs (if needed)
        if: failure()
        run: |
          docker logs ${{ env.CONTAINER_NAME }}

      # ---------------- SUCCESS MESSAGE ----------------
      - name: Deployment Success
        if: success()
        run: echo "Deployment completed successfully 🚀"

      # ---------------- FAILURE MESSAGE ----------------
      - name: Deployment Failed
        if: failure()
        run: echo "Build or Deployment failed ❌"